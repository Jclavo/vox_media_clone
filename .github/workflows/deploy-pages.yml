# Deploy this static site to GitHub Pages.
#
# First-time setup in the repo on GitHub:
#   Settings → Pages → Build and deployment → Source: GitHub Actions
#
# After pushing, open the "Deploy static site to Pages" workflow run; the live URL
# appears under Settings → Pages (and in the job summary).

name: Deploy static site to Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bundle static files
        run: |
          mkdir -p _site
          cp index.html _site/
          for dir in css scripts audio; do
            if [ -d "$dir" ]; then cp -r "$dir" _site/; fi
          done

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
