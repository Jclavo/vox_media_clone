<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcritor de Áudio • PT-BR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --surface:   #f0f0f0;
      --border:    #2e2e3a;
      --accent:    #0096FF;
      --accent-hi: #4a15f8;
      --text:      #000000;
      --muted:     #000000;
      --success:   #3ecf8e;
      --error:     #f87171;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      padding: 2rem;
      line-height: 1.6;
    }

    .container {
      width: 100%;
      max-width: 800px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 0 60px rgba(124, 92, 252, 0.08);
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #7c5cfc22, #7c5cfc44);
      border: 1px solid #7c5cfc55;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 30px;
      height: 30px;
      fill: var(--accent-hi);
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.5rem;
    }

    .api-notice {
      background: rgba(62, 207, 142, 0.08);
      border: 1px solid rgba(62, 207, 142, 0.25);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      margin-bottom: 2rem;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .api-notice code {
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      color: var(--success);
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 2rem 1.5rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.25rem;
      position: relative;
      text-align: center;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124, 92, 252, 0.06);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .drop-zone .dz-text {
      pointer-events: none;
    }

    .drop-zone .dz-icon {
      margin-bottom: 0.75rem;
    }

    .drop-zone .dz-label {
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .drop-zone .dz-label span {
      color: var(--accent-hi);
      font-weight: 500;
    }

    /* File info */
    .file-info {
      display: none;
      align-items: center;
      gap: 0.75rem;
      background: rgba(124, 92, 252, 0.1);
      border: 1px solid rgba(124, 92, 252, 0.25);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
    }

    .file-info.visible { display: flex; }

    .file-info .fi-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .file-info .fi-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .file-info .fi-meta { overflow: hidden; flex: 1; }
    .file-info .fi-name {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-info .fi-size {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .file-info .fi-remove {
      margin-left: auto;
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .file-info .fi-remove:hover { color: var(--error); }

    /* Buttons */
    .button-row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .btn {
      flex: 1;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-hi));
      color: #fff;
    }

    .btn-primary:hover:not(:disabled) {
      opacity: 0.88;
      transform: translateY(-1px);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: var(--surface-2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--text);
    }

    /* Status & Loading */
    .status {
      margin-bottom: 1rem;
      font-size: 0.85rem;
      min-height: 1.2em;
      font-weight: 500;
    }
    .status.success { color: var(--success); }
    .status.error { color: var(--error); }

    .loading {
      display: none;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem;
      background: rgba(124, 92, 252, 0.1);
      border: 1px solid rgba(124, 92, 252, 0.25);
      border-radius: 10px;
      margin-bottom: 1.25rem;
      font-size: 0.9rem;
    }

    .loading.active { display: flex; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(124, 92, 252, 0.3);
      border-top-color: var(--accent-hi);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Transcript */
    .transcript-section {
      display: none;
    }

    .transcript-section.visible {
      display: block;
    }

    .transcript-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }

    .transcript-header h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .transcript-header .badge {
      background: rgba(62, 207, 142, 0.2);
      color: var(--success);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.35rem 0.75rem;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .transcript-text {
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      line-height: 1.7;
      font-size: 0.95rem;
      color: var(--text);
      max-height: 300px;
      overflow-y: auto;
      word-break: break-word;
    }

    .transcript-text::-webkit-scrollbar {
      width: 6px;
    }

    .transcript-text::-webkit-scrollbar-track {
      background: transparent;
    }

    .transcript-text::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }

    .transcript-text::-webkit-scrollbar-thumb:hover {
      background: var(--muted);
    }

    .transcript-actions {
      display: flex;
      gap: 0.75rem;
    }

    .btn-copy {
      flex: 1;
    }

    .btn-download {
      flex: 1;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .card {
        padding: 2rem 1.5rem;
      }

      h1 {
        font-size: 1.4rem;
      }

      .button-row {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm0 2a7 7 0 110 14A7 7 0 0112 5zm-1 3.5v5.268l-2.276-1.314-.998 1.73 3.774 2.178L13 16.282V8.5h-2z"/>
        </svg>
      </div>

      <h1>Transcritor de Áudio</h1>
      <p class="subtitle">Converta seu áudio em texto</p>

      <div class="api-notice">
        Para usar, adicione sua chave da API Deepgram <code>DEEPGRAM_API_KEY</code>.
      </div>

      <!-- Drop zone -->
      <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" accept=".mp3,audio/mpeg" />
        <div class="dz-text">
          <div class="dz-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7878a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <div class="dz-label">Arraste um MP3 ou <span>escolha um arquivo</span></div>
        </div>
      </div>

      <!-- File info -->
      <div class="file-info" id="fileInfo">
        <div class="fi-icon">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm-1 5.5v5.268l-2.276-1.314-.998 1.73 3.774 2.178L13 16.282V8.5h-2z"/>
          </svg>
        </div>
        <div class="fi-meta">
          <div class="fi-name" id="fileName">—</div>
          <div class="fi-size" id="fileSize">—</div>
        </div>
        <button class="fi-remove" id="removeBtn" title="Remover arquivo">✕</button>
      </div>

      <!-- Loading state -->
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <span id="loadingText">Transcrevendo seu áudio...</span>
      </div>

      <!-- Status -->
      <div class="status" id="status"></div>

      <!-- Buttons -->
      <div class="button-row">
        <button class="btn btn-primary" id="transcribeBtn" disabled>Transcrever</button>
        <button class="btn btn-secondary" id="settingsBtn">Configurações</button>
      </div>

      <!-- Transcript section -->
      <div class="transcript-section" id="transcriptSection">
        <div class="transcript-header">
          <h2>Transcrição</h2>
          <div class="badge">Português (Brasil)</div>
        </div>
        <div class="transcript-text" id="transcriptText"></div>
        <div class="transcript-actions">
          <button class="btn btn-primary btn-copy" id="copyBtn">Copiar</button>
          <button class="btn btn-secondary btn-download" id="downloadBtn">Baixar TXT</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:999">
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;max-width:400px;width:90%">
      <h2 style="font-family:'Space Grotesk';font-size:1.3rem;margin-bottom:1.5rem;letter-spacing:-0.01em">Configurações da API</h2>
      <div style="margin-bottom:1.5rem">
        <label style="display:block;font-size:0.9rem;color:var(--muted);margin-bottom:0.5rem">Deepgram API Key</label>
        <input type="password" id="apiKeyInput" style="width:100%;padding:0.75rem;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:monospace;font-size:0.85rem" placeholder="sk-...">
      </div>
      <small style="color:var(--muted);display:block;margin-bottom:1.5rem">
        Obtenha uma chave gratuita em <a href="https://console.deepgram.com" target="_blank" style="color:var(--accent-hi);text-decoration:none">console.deepgram.com</a>
      </small>
      <div style="display:flex;gap:0.75rem">
        <button id="saveApiKeyBtn" class="btn btn-primary" style="flex:1">Salvar</button>
        <button id="closeSettingsBtn" class="btn btn-secondary" style="flex:1">Cancelar</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== CONFIG ====================
    let DEEPGRAM_API_KEY = localStorage.getItem('deepgramApiKey') || '';

    // ==================== DOM ELEMENTS ====================
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const removeBtn = document.getElementById('removeBtn');
    const transcribeBtn = document.getElementById('transcribeBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const loading = document.getElementById('loading');
    const loadingText = document.getElementById('loadingText');
    const status = document.getElementById('status');
    const transcriptSection = document.getElementById('transcriptSection');
    const transcriptText = document.getElementById('transcriptText');
    const copyBtn = document.getElementById('copyBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    const settingsModal = document.getElementById('settingsModal');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const saveApiKeyBtn = document.getElementById('saveApiKeyBtn');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');

    let selectedFile = null;

    // ==================== UTILITIES ====================
    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status' + (type ? ' ' + type : '');
    }

    function showLoading(show, message = 'Transcrevendo seu áudio...') {
      loading.classList.toggle('active', show);
      if (message) loadingText.textContent = message;
    }

    // ==================== FILE HANDLING ====================
    function setFile(file) {
      if (!file) return;
      if (file.type !== 'audio/mpeg' && !file.name.toLowerCase().endsWith('.mp3')) {
        showStatus('❌ Apenas arquivos MP3 são aceitos.', 'error');
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        showStatus('❌ Arquivo exceeds 50 MB limit.', 'error');
        return;
      }
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      fileInfo.classList.add('visible');
      transcribeBtn.disabled = false;
      transcriptSection.classList.remove('visible');
      showStatus('', '');
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      fileInfo.classList.remove('visible');
      transcribeBtn.disabled = true;
      transcriptSection.classList.remove('visible');
      showStatus('', '');
    }

    // ==================== FILE DRAG & DROP ====================
    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    removeBtn.addEventListener('click', clearFile);

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    // ==================== TRANSCRIPTION ====================
    async function transcribeAudio() {
      if (!selectedFile || !DEEPGRAM_API_KEY) {
        showStatus('❌ API key não configurada. Clique em ⚙️ Configurações.', 'error');
        return;
      }

      transcribeBtn.disabled = true;
      showLoading(true);
      showStatus('', '');

      try {
        // Read file as base64
        const arrayBuffer = await selectedFile.arrayBuffer();
        const base64 = btoa(String.fromCharCode(...new Uint8Array(arrayBuffer)));

        // Call Deepgram API
        const response = await fetch('https://api.deepgram.com/v1/listen?language=pt-BR', {
          method: 'POST',
          headers: {
            'Authorization': `Token ${DEEPGRAM_API_KEY}`,
            'Content-Type': 'audio/mpeg'
          },
          body: arrayBuffer
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.err || 'Deepgram API error');
        }

        const result = await response.json();
        const transcript = result.results?.channels?.[0]?.alternatives?.[0]?.transcript;

        if (!transcript) {
          throw new Error('Nenhuma transcrição retornada');
        }

        // Display result
        transcriptText.textContent = transcript;
        transcriptSection.classList.add('visible');
        showStatus('✓ Transcrição concluída!', 'success');
      } catch (error) {
        console.error('Error:', error);
        if (error.message.includes('401') || error.message.includes('Unauthorized')) {
          showStatus('❌ API key inválida. Verifique em ⚙️ Configurações.', 'error');
        } else {
          showStatus(`❌ Erro: ${error.message}`, 'error');
        }
      } finally {
        showLoading(false);
        transcribeBtn.disabled = false;
      }
    }

    transcribeBtn.addEventListener('click', transcribeAudio);

    // ==================== TRANSCRIPT ACTIONS ====================
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(transcriptText.textContent);
        showStatus('✓ Copiado para área de transferência!', 'success');
        setTimeout(() => showStatus('', ''), 2000);
      } catch (error) {
        showStatus('❌ Falha ao copiar', 'error');
      }
    });

    downloadBtn.addEventListener('click', () => {
      const element = document.createElement('a');
      element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(transcriptText.textContent));
      element.setAttribute('download', `transcricao-${new Date().toISOString().slice(0,10)}.txt`);
      element.style.display = 'none';
      document.body.appendChild(element);
      element.click();
      document.body.removeChild(element);
    });

    // ==================== SETTINGS ====================
    settingsBtn.addEventListener('click', () => {
      apiKeyInput.value = DEEPGRAM_API_KEY;
      settingsModal.style.display = 'flex';
    });

    closeSettingsBtn.addEventListener('click', () => {
      settingsModal.style.display = 'none';
    });

    saveApiKeyBtn.addEventListener('click', () => {
      DEEPGRAM_API_KEY = apiKeyInput.value.trim();
      localStorage.setItem('deepgramApiKey', DEEPGRAM_API_KEY);
      settingsModal.style.display = 'none';
      showStatus('✓ API key salva!', 'success');
      setTimeout(() => showStatus('', ''), 2000);
    });

    apiKeyInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') saveApiKeyBtn.click();
    });

    settingsModal.addEventListener('click', (e) => {
      if (e.target === settingsModal) settingsModal.style.display = 'none';
    });

    // ==================== INIT ====================
    if (DEEPGRAM_API_KEY) {
      showStatus('✓ API key carregada', 'success');
      setTimeout(() => showStatus('', ''), 2000);
    }
  </script>
</body>
</html>
