<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP3 Upload</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #ffffff;
      --surface:   #f0f0f0;
      --border:    #2e2e3a;
      --accent:    #0096FF;
      --accent-hi: #4a15f8;
      --text:      #000000;
      --muted:     #000000;
      --success:   #3ecf8e;
      --error:     #f87171;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      padding: 2rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 440px;
      text-align: center;
      box-shadow: 0 0 60px rgba(124, 92, 252, 0.08);
    }

    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #7c5cfc22, #7c5cfc44);
      border: 1px solid #7c5cfc55;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon svg {
      width: 30px;
      height: 30px;
      fill: var(--accent-hi);
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    p.subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 14px;
      padding: 2rem 1.5rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      margin-bottom: 1.25rem;
      position: relative;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--accent);
      background: rgba(124, 92, 252, 0.06);
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-zone .dz-text {
      pointer-events: none;
    }

    .drop-zone .dz-label {
      font-size: 0.88rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .drop-zone .dz-label span {
      color: var(--accent-hi);
      font-weight: 500;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 0.85rem 1.5rem;
      border: none;
      border-radius: 12px;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      background: linear-gradient(135deg, var(--accent), var(--accent-hi));
      color: #fff;
    }

    .btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* File info */
    .file-info {
      display: none;
      align-items: center;
      gap: 0.75rem;
      background: rgba(124, 92, 252, 0.1);
      border: 1px solid rgba(124, 92, 252, 0.25);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      text-align: left;
    }

    .file-info.visible { display: flex; }

    .file-info .fi-icon {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .file-info .fi-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .file-info .fi-meta { overflow: hidden; }
    .file-info .fi-name {
      font-size: 0.88rem;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-info .fi-size { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }

    .file-info .fi-remove {
      margin-left: auto;
      flex-shrink: 0;
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1.1rem;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    .file-info .fi-remove:hover { color: var(--error); }

    /* Status */
    .status {
      margin-top: 1rem;
      font-size: 0.85rem;
      min-height: 1.2em;
      font-weight: 500;
    }
    .status.success { color: var(--success); }
    .status.error   { color: var(--error); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm0 2a7 7 0 110 14A7 7 0 0112 5zm-1 3.5v5.268l-2.276-1.314-.998 1.73 3.774 2.178L13 16.282V8.5h-2z"/>
      </svg>
    </div>

    <h1>Upload your track</h1>
    <p class="subtitle">Drop an MP3 file below or click to browse.<br/>Max file size: 50 MB.</p>

    <!-- Drop zone -->
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".mp3,audio/mpeg" />
      <div class="dz-text">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7878a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <div class="dz-label">Drag & drop or <span>choose file</span></div>
      </div>
    </div>

    <!-- File info row -->
    <div class="file-info" id="fileInfo">
      <div class="fi-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm-1 5.5v5.268l-2.276-1.314-.998 1.73 3.774 2.178L13 16.282V8.5h-2z"/>
        </svg>
      </div>
      <div class="fi-meta">
        <div class="fi-name" id="fileName">—</div>
        <div class="fi-size" id="fileSize">—</div>
      </div>
      <button class="fi-remove" id="removeBtn" title="Remove file">✕</button>
    </div>

    <button class="btn" id="uploadBtn" disabled>Upload MP3</button>
    <div class="status" id="status"></div>
  </div>

  <script>
    const dropZone  = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo  = document.getElementById('fileInfo');
    const fileName  = document.getElementById('fileName');
    const fileSize  = document.getElementById('fileSize');
    const removeBtn = document.getElementById('removeBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const status    = document.getElementById('status');

    let selectedFile = null;

    function formatBytes(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function setFile(file) {
      if (!file) return;
      if (file.type !== 'audio/mpeg' && !file.name.toLowerCase().endsWith('.mp3')) {
        showStatus('Only MP3 files are accepted.', 'error');
        return;
      }
      if (file.size > 50 * 1024 * 1024) {
        showStatus('File exceeds 50 MB limit.', 'error');
        return;
      }
      selectedFile = file;
      fileName.textContent = file.name;
      fileSize.textContent = formatBytes(file.size);
      fileInfo.classList.add('visible');
      uploadBtn.disabled = false;
      showStatus('', '');
    }

    function clearFile() {
      selectedFile = null;
      fileInput.value = '';
      fileInfo.classList.remove('visible');
      uploadBtn.disabled = true;
      showStatus('', '');
    }

    function showStatus(msg, type) {
      status.textContent = msg;
      status.className = 'status' + (type ? ' ' + type : '');
    }

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) setFile(fileInput.files[0]);
    });

    removeBtn.addEventListener('click', clearFile);

    // Drag & drop
    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    // Upload handler — wire to your real endpoint here
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;

      uploadBtn.disabled = true;
      uploadBtn.textContent = 'Uploading…';
      showStatus('', '');

      // Simulate an upload (replace with your real fetch/FormData call)
      await new Promise(r => setTimeout(r, 1800));

      uploadBtn.textContent = 'Upload MP3';
      showStatus('✓ Upload complete!', 'success');
      clearFile();
    });
  </script>
</body>
</html>
