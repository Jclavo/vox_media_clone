<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vox Media Clone</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Vox Media Clone</h1>
      <p>This is a clone of the Vox Media website.</p>
    </header>

    <section id="audio-player">
      <h2>Play Audio File</h2>
      <audio controls>
        <source src="sample.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </section>

    <section id="content-divs">
      <h2>Slides from the Mp3 file</h2>
      <div class="div-grid">
        <div class="box">Slide 1</div>
        <div class="box">Slide 2</div>
        <div class="box">Slide 3</div>
        <div class="box">Slide 4</div>
      </div>
    </section>
  </div>
</body>
</html>
