<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vox Media Alternative</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/dist/sal.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Vox Media Alternative [v0.1.0]</h1>
      <p>This is an alternative of the Vox Media website.</p>
    </header>

    <section id="audio-player">
      <h2>Play Audio File</h2>
      <audio id="podcast-audio" controls>
        <source src="audio/episode1.mp3" type="audio/mp3">
        Your browser does not support the audio element.
      </audio>
    </section>

    <section id="lyrics-section">
      <h2>Lyrics / Transcript</h2>
      <p class="lyrics-note">Add timestamps and text in a <code>csv</code> file at <code>transcript</code> folder to match your audio.</p>
      <div id="lyrics-list" class="lyrics-list"></div>
    </section>
  </div>
  <script src="scripts/dist/sal.js"></script>
  <script src="scripts/script.js"></script>
</body>
</html>
