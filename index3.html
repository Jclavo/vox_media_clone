<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Rows</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f0ede8;
      font-family: 'Georgia', serif;
    }

    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90vw;
      height: 90vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: #fff;
    }

    /* Page 1 colors */
    .page-1 .row:nth-child(1) { background-color: #3d5a80; }
    .page-1 .row:nth-child(2) { background-color: #98c1d9; }
    .page-1 .row:nth-child(3) { background-color: #e76f51; }

    /* Page 2 colors */
    .page-2 .row:nth-child(1) { background-color: #2d6a4f; }
    .page-2 .row:nth-child(2) { background-color: #74c69d; }
    .page-2 .row:nth-child(3) { background-color: #f4a261; }
  </style>
</head>
<body>

  <div class="page">
    <div class="container page-1">
      <div class="row">Row 1</div>
      <div class="row">Row 2</div>
      <div class="row">Row 3</div>
    </div>
  </div>

  <div class="page">
    <div class="container page-2">
      <div class="row">Row 4</div>
      <div class="row">Row 5</div>
      <div class="row">Row 6</div>
    </div>
  </div>

</body>
</html>
