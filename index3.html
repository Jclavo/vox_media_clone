<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Rows</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0ede8;
      font-family: 'Georgia', serif;
    }

    .container {
      width: 90vw;
      height: 90vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .row {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: #fff;
    }

    .row-top {
      height: 20vh;
      background-color: #3d5a80;
    }

    .row-bottom {
      height: 80vh;
      background-color: #e76f51;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row row-top">Row 1</div>
    <div class="row row-bottom">Row 2</div>
  </div>
</body>
</html>
