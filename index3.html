<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Infinite Rows</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f0ede8;
      font-family: 'Georgia', serif;
      display: flex;
      justify-content: center;
    }

    .container {
      width: 90vw;
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 20px 0;
    }

    .row {
      width: 100%;
      height: calc((90vh - 12px * 2) / 3);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 0.05em;
      color: #fff;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .row.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="container" id="container">
    <div class="row" style="background-color:#3d5a80">Row 1</div>
    <div class="row" style="background-color:#98c1d9">Row 2</div>
    <div class="row" style="background-color:#e76f51">Row 3</div>
    <div class="row" style="background-color:#2d6a4f">Row 4</div>
    <div class="row" style="background-color:#74c69d">Row 5</div>
    <div class="row" style="background-color:#f4a261">Row 6</div>
  </div>

  <script>
    const colors = [
      '#3d5a80','#98c1d9','#e76f51',
      '#2d6a4f','#74c69d','#f4a261',
      '#7b2d8b','#c77dff','#e63946',
      '#1d3557','#457b9d','#a8dadc',
      '#6d4c41','#bcaaa4','#ef6c00',
    ];

    const container = document.getElementById('container');
    let rowCount = 6;

    // Observe rows for fade-in animation
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    function observeRows() {
      document.querySelectorAll('.row:not(.visible)').forEach(row => observer.observe(row));
    }

    // Append new rows when near bottom
    const scrollObserver = new IntersectionObserver((entries) => {
      if (entries[0].isIntersecting) {
        for (let i = 0; i < 3; i++) {
          rowCount++;
          const row = document.createElement('div');
          row.className = 'row';
          row.textContent = `Row ${rowCount}`;
          row.style.backgroundColor = colors[(rowCount - 1) % colors.length];
          container.appendChild(row);
        }
        // Move sentinel to new last row
        container.appendChild(sentinel);
        observeRows();
      }
    }, { threshold: 1.0 });

    // Sentinel element at the bottom to trigger new rows
    const sentinel = document.createElement('div');
    sentinel.style.height = '1px';
    container.appendChild(sentinel);
    scrollObserver.observe(sentinel);

    observeRows();
  </script>

</body>
</html>
